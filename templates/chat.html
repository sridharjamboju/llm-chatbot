<!DOCTYPE html>
<html>

<head>
<title>Local AI Chatbot</title>

<style>

body{
    font-family: Arial;
    margin:40px;
}

#chatbox{
    width:600px;
    height:400px;
    border:1px solid gray;
    padding:10px;
    overflow-y:scroll;
    margin-bottom:10px;
}

.user{
    color:blue;
}

.ai{
    color:green;
}

</style>

</head>

<body>

<h2>Local AI Chatbot</h2>

<div id="chatbox"></div>

<input type="text" id="user_input" placeholder="Type your message here" style="width:500px">
<button onclick="sendMessage()">Send</button>

<script>

function sendMessage(){

let message=document.getElementById("user_input").value;

let chatbox=document.getElementById("chatbox");

chatbox.innerHTML += "<p class='user'><b>You:</b> "+message+"</p>";

fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:message})
})

.then(response=>response.json())

.then(data=>{

chatbox.innerHTML += "<p class='ai'><b>AI:</b> "+data.reply+"</p>";

chatbox.scrollTop=chatbox.scrollHeight;

});

document.getElementById("user_input").value="";

}

</script>

</body>

</html>
